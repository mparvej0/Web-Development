<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting Text: Bold, Italics, Underline, etc.</title>
</head>
<body>
    <p>I am a <b>Raju</b></p>
    <p>I am a <i>Raju</i></p>
    <p>I am a <u>Raju</u></p>
    <p>This <s>Wrong</s> text.</p>
    <p>Old price: <del>$100</del> New price: $80</p>
    <p>H<sub>2</sub>O</p>
    <p>2<sup>n</sup></p>
    <p>This is <b><i><u>bold, italic and underline</b></i></u> text. </p>
    <p>This is <b><em>bold and italic</em></b> text. </p>
</body>
</html>
