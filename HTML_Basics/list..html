<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List: Ordered and Unordered</title>
</head>
<body>
    <h1>Lists</h1>
    <!-- Oredred List -->
     <ol>
        <li>Wake up</li>
        <li>Brush teeth</li>
        <li>G to work</li>
     </ol>
     <!-- Unordered List -->
    <ul>
        <li>Apple</li>
        <li>Samsung</li>
        <li>Banana</li>
    </ul>
    <!-- Description List -->
     <dl>
        <dt>HTML</dt>
        <dd>A markup language for creating web pages.</dd>

        <dt>CSS</dt>
        <DD>Used for Styling HTML pages</DD>
     </dl>
     <ul>
        <li>Fruits</li>
        <ul>
            <li>Apple</li>
            <Li>Mango</Li>
            <ul>
                <li>Vegetables</li>
     </ul>
</body>
</html>
